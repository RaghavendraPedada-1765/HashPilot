services:
  - type: web
    name: hashpilot-backend
    env: python
    buildCommand: "cd backend && pip install -r requirements.txt"
    startCommand: "cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    disk:
      name: sqlite-data
      mountPath: /opt/render/project/src/backend/data
      sizeGB: 1
    envVars:
      - key: DATABASE_URL
        value: sqlite:///data/hashpilot.db
      - key: PYTHON_VERSION
        value: 3.13.1
      - key: ALLOWED_ORIGINS
        sync: false
        # Update this value in the Render dashboard once your frontend is deployed
