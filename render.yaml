databases:
  # ── Free PostgreSQL instance ───────────────────────────────────────────────
  - name: hashpilot-db
    plan: free
    databaseName: hashpilot
    user: hashpilot

services:
  # ── Backend: FastAPI / Uvicorn ─────────────────────────────────────────────
  - type: web
    name: hashpilot-backend
    env: python
    region: oregon   # Change to: oregon | frankfurt | singapore | ohio
    plan: free
    buildCommand: "cd backend && pip install -r requirements.txt"
    startCommand: "cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: hashpilot-db        # Links to the database declared above
          property: connectionString # Render injects the full postgres:// URL
      - key: PYTHON_VERSION
        value: "3.13.1"
      - key: LOG_LEVEL
        value: INFO
      - key: ALLOWED_ORIGINS
        sync: false
        # ⬆ Set this in the Render dashboard AFTER your frontend URL is known.
        # Example value:  https://hashpilot-frontend.onrender.com

  # ── Frontend: Vite/React Static Site ──────────────────────────────────────
  - type: web
    name: hashpilot-frontend
    env: static
    region: oregon
    plan: free
    buildCommand: "cd frontend && npm ci && npm run build"
    staticPublishPath: ./frontend/dist
    routes:
      # Redirect all 404s to index.html so React Router handles navigation
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
        # ⬆ Set to your backend URL, e.g.: https://hashpilot-backend.onrender.com
      - key: VITE_BENCHMARK_WS_URL
        sync: false
        # ⬆ Set to: wss://hashpilot-backend.onrender.com/ws/benchmark
